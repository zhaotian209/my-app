version: '1.0'
name: android-apk-build
displayName: Android APK 构建

triggers:
  push:
    branches:
      - main
  pr:
    branches:
      - main

stages:
  - name: build
    displayName: 构建 APK
    steps:
      - step: checkout
        name: checkout
        displayName: 下载代码
        gitDepth: 1
      
      - step: build@shell
        name: build_apk
        displayName: 编译 APK
        inputs:
          shell: bash
          script: |
            chmod +x gradlew
            ./gradlew assembleDebug
      
      - step: publish@general_artifacts
        name: upload_apk
        displayName: 上传 APK
        inputs:
          dependArtifact: 'app/build/outputs/apk/debug/*.apk'
          artifactName: app-debug.apk
        dependOn: build_apk
