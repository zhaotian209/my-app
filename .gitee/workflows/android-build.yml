version: '1.0'
name: android-build
displayName: Android APK 构建

triggers:
  push:
    branches:
      - main
  pr:
    branches:
      - main

stages:
  - name: compile
    displayName: 编译
    steps:
      - step: checkout
        name: checkout
        displayName: 下载代码
        gitDepth: 1
      
      - step: build@gradle
        name: build
        displayName: Gradle 构建
        inputs:
          gradleVersion: '8.5'
          goals: 'assembleDebug'
          jdkVersion: 17
          useWrapper: true
      
      - step: publish@general_artifacts
        name: publish
        displayName: 上传产物
        inputs:
          dependArtifact: 'app/build/outputs/apk/debug/*.apk'
          artifactName: app-debug.apk
        dependOn: build
