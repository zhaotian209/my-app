name: Android APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
      
    - name: Download clean gradlew from official source
      run: |
        echo "=== Before: Check files ==="
        ls -la
        echo "=== Remove old gradlew ==="
        rm -f gradlew gradlew.bat
        echo "=== Download clean gradlew ==="
        curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradlew -o gradlew
        curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradlew.bat -o gradlew.bat
        chmod +x gradlew
        echo "=== After: Verify gradlew ==="
        ls -la gradlew
        file gradlew
        head -1 gradlew
      
    - name: Build Debug APK
      run: |
        echo "=== Starting build ==="
        ./gradlew --version
        ./gradlew assembleDebug --no-daemon --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
