name: Android APK Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Debug info
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== File structure ==="
        ls -la
        echo "=== Gradle wrapper check ==="
        file gradlew
        head -3 gradlew
        echo "=== Java version ==="
        java -version
        echo "=== Gradlew test ==="
        ./gradlew --version || echo "gradlew failed with exit code: $?"
        
    - name: Build APK
      run: ./gradlew assembleDebug --info
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
